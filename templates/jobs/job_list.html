<!DOCTYPE html>
<html>
<head>
    <title>Available Jobs</title>
</head>
<body>

<h1>Available Jobs</h1>

{% for job in jobs %}

<h2>{{ job.title }}</h2>

<p><b>Company:</b> {{ job.company_name }}</p>

<p>{{ job.description }}</p>

<p><b>Skills Required:</b> {{ job.skills_required }}</p>

<a href="{% url 'apply_job' job.id %}">Apply</a>

<hr>

{% empty %}

<p>No jobs available</p>

{% endfor %}

</body>
</html>
